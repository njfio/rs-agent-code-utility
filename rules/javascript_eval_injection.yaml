id: javascript-eval-injection
title: Dynamic eval call
description: Evaluating dynamic input with eval can execute arbitrary JavaScript in the current page context.
finding_type: injection
severity: critical
confidence: 0.91
languages:
  - javascript
remediation: Replace eval with structured parsing or a fixed dispatch table over allowed operations.
cwe_id: CWE-95
pattern_file: javascript_eval_injection.scm
taint_requirement: "@input should come from untrusted user-controlled input"
