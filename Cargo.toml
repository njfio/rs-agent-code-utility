[package]
name = "rust_tree_sitter"
version = "0.2.0-alpha.1"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "Tree-sitter-backed code parsing and analysis primitives for the upcoming rts-daemon + rts-mcp retrieval stack"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rust_tree_sitter"
keywords = ["parsing", "tree-sitter", "syntax", "ast", "source-code"]
categories = ["parsing", "development-tools"]

[dependencies]
# Tree-sitter runtime + 12 language grammars (P1 will bump these to 0.26)
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-python = "0.20"
tree-sitter-c = "0.20"
tree-sitter-cpp = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-go = "0.20"
tree-sitter-java = "0.20"
tree-sitter-php = "0.21"
tree-sitter-ruby = "0.20"
tree-sitter-swift = "0.4"
tree-sitter-kotlin = "0.2.11"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Serialization (still used by analyzer/symbol_table)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Core analysis helpers
regex = "1.10"
sha2 = "0.10"
rayon = "1.8"
petgraph = "0.6"
ignore = "0.4"
walkdir = "2.4"
parking_lot = "0.12"
crossbeam-channel = "0.5"
memmap2 = "0.9"
dashmap = "5.5"
num_cpus = "1.0"

# Time / IDs / paths
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
dirs = "5.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Dependency-manifest parsing (for dependency_analysis module)
toml = "0.8"

[dev-dependencies]
tempfile = "3.0"
criterion = "0.5"

[features]
default = ["std"]
std = []
wasm = []

[lib]
name = "rust_tree_sitter"
path = "src/lib.rs"
