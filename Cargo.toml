[package]
name = "rust_tree_sitter"
version = "0.2.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "A Rust library for processing source code with tree-sitter"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rust_tree_sitter"
keywords = ["parsing", "tree-sitter", "syntax", "ast", "source-code"]
categories = ["parsing", "development-tools"]

[dependencies]
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-python = "0.20"
tree-sitter-c = "0.20"
tree-sitter-cpp = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-go = "0.20"
tree-sitter-java = "0.20"
tree-sitter-php = "0.21"
tree-sitter-ruby = "0.20"
tree-sitter-swift = "0.4"
tree-sitter-kotlin = "0.2.11"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
clap = { version = "4.0", features = ["derive"], optional = true }
colored = { version = "2.0", optional = true }
indicatif = { version = "0.17", optional = true }
serde_json = "1.0"
toml = "0.8"
tabled = { version = "0.15", optional = true }
regex = "1.10"
sha2 = "0.10"
rand = "0.8"
rayon = "1.8"
petgraph = "0.6"
ignore = "0.4"
crc32fast = "1.4"
pulldown-cmark = { version = "0.10", optional = true }
flate2 = "1.0"
crossbeam-channel = "0.5"
parking_lot = "0.12"
memmap2 = { version = "0.9", optional = true }
walkdir = "2.4"
base64 = "0.21"

# Enhanced interactive mode dependencies
rustyline = { version = "12.0", optional = true }
syntect = { version = "5.0", optional = true }

# Security fixes - ring will be updated via dependency resolution when conflicts are resolved

# Phase A: Infrastructure Dependencies
tokio = { version = "1.0", features = ["full"], optional = true }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], optional = true }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"], optional = true }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
config = { version = "0.14", optional = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
anyhow = { version = "1.0", optional = true }
governor = { version = "0.6", optional = true }
tower = { version = "0.4", features = ["timeout", "retry"], optional = true }

# Machine Learning Dependencies for Intent Mapping
candle-core = { version = "0.9.1", optional = true }
candle-nn = { version = "0.9.1", optional = true }
candle-transformers = { version = "0.9.1", optional = true }
hf-hub = { version = "0.5.0", default-features = false, features = ["tokio", "rustls-tls"], optional = true }
tokenizers = { version = "0.19", optional = true }


[dev-dependencies]
tempfile = "3.0"
wiremock = "0.5"
criterion = "0.5"
assert_cmd = "2.0"
predicates = "3.0"
proptest = "1.6"
tokio = { version = "1.0", features = ["full"] }

[features]
default = ["std", "serde"]
std = []
serde = []
wasm = []

# Demo feature gates all examples
# Enable with: cargo build --examples --features demo
# or run a specific example with: cargo run --example NAME --features demo
# This keeps CI and normal builds free from example-related breakages.
demo = []

# Optional capability flags
cli = [
    "dep:clap",
    "dep:colored",
    "dep:indicatif",
    "dep:rustyline",
    "dep:syntect",
    "dep:tabled",
    "dep:tracing-subscriber",
]
ml = [
    "dep:anyhow",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:hf-hub",
]
net = [
    "dep:anyhow",
    "dep:reqwest",
    "dep:tokio",
    "dep:governor",
    "dep:tower",
    "dep:config",
]
mmap = [
    "dep:memmap2",
]
db = [
    "dep:anyhow",
    "dep:sqlx",
    "dep:config",
]
wiki = [
    "dep:pulldown-cmark",
    "net",
]
full = ["std", "serde", "ml", "net", "db", "cli", "wiki", "mmap"]

