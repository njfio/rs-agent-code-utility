# Semantic-search evaluation corpus for `crates/rts-core`.
#
# Each query is a natural-language question an agent might ask while
# working in this codebase. `expected_top_k` is a hand-graded list of
# symbol names that should appear in the top-K results of any good
# ranker.
#
# Purpose: provide a reproducible baseline for measuring whether
# future ranking improvements (embedding-based, LLM-routed, etc.)
# actually help. See `crates/rts-bench/src/semantic.rs` for the
# scoring methodology.
#
# Run: `rts-bench semantic --corpus corpus/semantic-eval-rts-core.toml \
#                          --workspace crates/rts-core`
#
# Grading methodology:
# - All `expected_top_k` names must exist in the indexed workspace.
#   The corpus is validated by probing the daemon with
#   `find_symbol(pattern="*", limit=4096)` and confirming every name
#   appears in the pool. Names known to be missing are flagged.
# - Order doesn't matter; the scorer checks membership in top-K.
# - Negative-control queries (empty `expected_top_k`) target topics
#   genuinely absent from rts-core. Confirmed absent via `rg` over
#   the workspace: no JWT, GraphQL, or SMTP code anywhere.
# - Audited 2026-05-15 after the v0.4.1 limit-param landing exposed
#   the full ranked pool. Previous version included fictional names
#   like `detect_language`, `count_symbols`, `render_signature` that
#   the corpus author imagined but never verified.

version = 1

# ─── Structural questions the existing graph should answer well ───

[[query]]
text = "what handles tree-sitter parsing?"
expected_top_k = ["parse", "parse_file_content", "create_syntax_tree", "Parser"]

[[query]]
text = "where is the syntax tree wrapper defined?"
# `Tree` doesn't exist in rts-core; the wrapper is named `SyntaxTree`.
# `TreeCursor` is the tree-sitter cursor type and a reasonable hit.
expected_top_k = ["SyntaxTree", "tree", "syntax_tree", "TreeCursor"]

[[query]]
text = "how does the analyzer walk nodes?"
# `walk_tree` doesn't exist; the actual walk types are `walk`/`walker`.
expected_top_k = ["find_nodes_by_kind", "collect_nodes_by_kind", "walk", "walker", "root_node"]

# "what does file analysis do?" removed post-PR-B. The query was a
# natural-language description of the deleted `CodebaseAnalyzer` and
# its `analyze_directory`/`FileAnalyzer`/`analyze_file` family. Post-
# cleanup, rts-core doesn't describe itself as doing "file analysis" —
# it parses content into symbols via `parse_content` + `extract_symbols`.
# The semantically-equivalent question is covered by "what handles
# tree-sitter parsing?" above. Re-add a tighter post-cleanup query in
# a follow-up corpus-recalibration PR.

[[query]]
text = "what's the entry point for language detection?"
# `detect_language` doesn't exist; the real entry points are the
# `detect_language_from_*` family. `from_extension` and `info_for_path`
# don't exist either; `LanguageInfo` is the closest type.
expected_top_k = [
    "detect_language_from_path",
    "detect_language_from_extension",
    "detect_language_from_content",
    "Language",
    "LanguageInfo",
]

# ─── Conceptual questions that may need fuzzier matching ───

[[query]]
text = "where does the code track which symbols are public?"
# `Visibility` and `Public` types don't exist in rts-core. The real
# visibility logic lives in `is_public*` predicates and the bare
# `visibility` field/method.
expected_top_k = [
    "is_public",
    "visibility",
    "is_public_function",
    "is_public_class",
    "is_public_method",
    "is_rust_item_public",
]

[[query]]
text = "what strips a symbol's body for display?"
# Replaces the previous fully-fictional "render_signature" query.
# rts-core's signature-rendering layer is the `render_*` family per
# language, plus the body-stripping helpers.
expected_top_k = [
    "render_strip_body",
    "render_strip_body_with_recursive_body",
    "render_rust",
    "render_python",
    "render_javascript",
]

[[query]]
text = "what's central to the codebase?"
expected_top_k = ["find_nodes_by_kind", "child_by_field_name", "contains", "children"]

# ─── Negative controls — topics genuinely absent from rts-core ───
#
# History: the original corpus used `auth`, `database connection pool`,
# and `http handler` — but rts-core ACTUALLY had `AuthenticationCheck`,
# `AdvancedThreadPool`, and `Handler` types (it was a code-analysis
# crate that detected these patterns in *other* people's code). Those
# were replaced with JWT / GraphQL / SMTP probes calibrated against the
# pre-PR-A 4096-symbol pool. PR-A's 13-module deletion + PR-B's
# CodebaseAnalyzer deletion shifted the fuzzy-neighbor vocabulary, so
# the same probes started hallucinating top1 hits like
# `DEFAULT_AUTO_VALIDATION_THRESHOLD` and `is_function_definition`, and
# the controls were removed pending recalibration. This is that
# recalibration against the post-cleanup (PRs #132–#134) symbol pool.
#
# A negative control is a query phrased like a plausible code question
# whose topic is genuinely absent from post-cleanup rts-core (now a
# parsing / extraction / signature-rendering crate). `expected_top_k = []`
# marks it: the scorer excludes empty-expected queries from
# `answerable_coverage` (numerator AND denominator — see
# `crates/rts-bench/src/semantic.rs`), so these never move the CI gate;
# they only verify the ranker doesn't return a confident false top1.
#
# Calibration: probed `find_symbol(pattern="*", limit=4096)` against
# `crates/rts-core` (the CI-mounted workspace, which INCLUDES
# `test_files/` + `tests/`) and chose topics whose content tokens have
# ZERO lexical overlap with any pooled symbol. The live traps in the
# post-cleanup pool are the `error.rs` builder family (`rate_limit_error`,
# `auth_error`, `network_error`, `not_supported_error`, `timeout_error`,
# …), the `constants.rs` scoring remnants, the `cache_*` family, and the
# per-language `render_*` family — so these controls avoid
# rate-limit/auth/cache/render/validate/parse/query wording. Each was
# verified to return an unrelated PageRank-fallback top1 (`cpp_using_keeps_whole`,
# `java_record_strips_body`, `clone_parser`, `new`, `after_macro_rules`,
# `end`), not a confident topical match. Re-verify after any future
# symbol-surface shift.

[[query]]
text = "what cipher encrypts payloads using AES before they are persisted?"
expected_top_k = []

[[query]]
text = "how does the DNS resolver look up records by their TTL?"
expected_top_k = []

[[query]]
text = "where is the SMTP client configured to deliver outbound mail?"
expected_top_k = []

[[query]]
text = "how does the GraphQL schema resolve nested subscriptions?"
expected_top_k = []

[[query]]
text = "how is the Kafka consumer offset committed after each poll?"
expected_top_k = []

[[query]]
text = "where does the Bluetooth device complete its pairing handshake?"
expected_top_k = []
