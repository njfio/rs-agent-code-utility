# Semantic-search evaluation corpus for `crates/rts-core` — blind v2.
#
# Companion to `semantic-eval-rts-core.toml`. Where v1 was authored
# after building the ranker (hence the v0.4.1 honest caveat about
# confirmation bias), v2 was written outside-in: queries phrased the
# way a new agent landing in *any* code-analysis crate might ask,
# without first peeking at the symbol table.
#
# Workflow used:
# 1. Drafted 18 queries from agent-coding-loop patterns: error/debug,
#    lifecycle, extension, performance, plus 5 fictional topics.
# 2. THEN probed `find_symbol(pattern="*", limit=4096)` to see what
#    realistic answers exist in the pool. Queries with no plausible
#    answer became negative controls; others got hand-graded
#    `expected_top_k` lists of real symbols.
# 3. Dropped 3 queries where every type would match ("how does X
#    initialize?" against a crate full of `*Analyzer`s with `new`).
#
# Categories covered (v1 corpus covered none of these):
#   - Error/debugging queries (3)
#   - Lifecycle/workflow queries (3)
#   - Extension/integration queries (2)
#   - Performance/optimization queries (1)
#   - Result-collection query (1)
#   - Negative controls (6, recalibrated post-cleanup PRs #132–#134)
#
# Purpose: stress-test the v0.4.1 100%-on-v1 baseline on queries that
# weren't shaped by knowledge of the codebase. If coverage drops
# meaningfully on v2, the v1 number was corpus-overfit. If it stays
# high, the baseline generalizes.

version = 1

# ─── Error / debugging queries ───

[[query]]
text = "what raises errors when parsing fails?"
expected_top_k = ["ParseErrorDetails", "Parser", "Error", "LanguageErrorDetails", "QueryErrorType"]

[[query]]
text = "how are tree-sitter parser errors reported?"
expected_top_k = ["TreeErrorDetails", "ParseErrorDetails", "Parser", "LanguageErrorDetails"]

[[query]]
text = "what error types exist for the parser?"
expected_top_k = [
    "ParseErrorDetails",
    "LanguageErrorDetails",
    "QueryErrorDetails",
    "TreeErrorDetails",
    "QueryErrorType",
    "Error",
]

# ─── Lifecycle / workflow queries ───

[[query]]
text = "what runs first when analysis starts?"
expected_top_k = ["FileAnalyzer", "CodebaseAnalyzer", "analyze", "analyze_file"]

[[query]]
text = "what cleans up after analysis?"
expected_top_k = ["clear", "clear_cache", "reset", "reset_statistics"]

# ─── Extension / integration queries ───

[[query]]
text = "where are language-specific queries defined?"
expected_top_k = [
    "LanguageParser",
    "QueryBuilder",
    "Query",
    "JavaScriptSyntax",
    "PythonSyntax",
]

[[query]]
text = "where is the JavaScript-specific extractor?"
expected_top_k = [
    "JavaScriptSyntax",
    "detect_js_allocations",
    "calculate_js_npath",
    "detect_js_memory_leaks",
]

# ─── Performance / optimization ───
#
# "where are allocation patterns optimized?" removed post-PR-A. The
# expected symbols (`AllocationHotspot`, `AllocationPattern`,
# `AsyncOptimization`, `MemoryHotspot`, `MemoryLeakCandidate`) all
# lived in the deleted `performance_analysis` and `memory_tracker`
# modules. Re-add only if a future PR reintroduces analogous
# instrumentation in rts-core.

# ─── Result-collection query ───
#
# "where does the analyzer collect results?" removed post-PR-B. The
# expected symbols (`AnalysisResult`, `ResultAggregator`,
# `SymbolAnalysisResult`, `DependencyAnalysisResult`) were on
# `CodebaseAnalyzer` which PR-B deleted entirely. The post-cleanup
# rts-core doesn't aggregate "analysis results" — `parse_content`
# returns `ParseOutcome` directly from extraction.

# ─── Negative controls — recalibrated post-cleanup (PRs #132–#134) ───
#
# The original 5 controls (file I/O failures, panic recovery, WebSocket
# handler, OAuth flow, Redis cache adapter) were calibrated against the
# pre-PR-A 4096-symbol pool. PR-A's 13-module deletion + PR-B's
# CodebaseAnalyzer + 4-sibling-types deletion shifted the fuzzy-neighbor
# vocabulary, so those probes started hallucinating confident top1 hits
# (`not_supported_error`, `Handler`, `VALIDATION_IMPLEMENTATION_WEIGHT`,
# `cache`). They were removed pending recalibration; this is that
# recalibration.
#
# A negative control is a query phrased like a plausible code question
# whose topic is genuinely absent from post-cleanup rts-core (a parsing
# / extraction / signature-rendering crate). It verifies the ranker
# does NOT surface a confident false top1. `expected_top_k = []` excludes
# the query from `answerable_coverage` (numerator AND denominator) — see
# `crates/rts-bench/src/semantic.rs` — so these do not move the CI gate.
#
# Calibration method: probed `find_symbol(pattern="*", limit=4096)`
# against `crates/rts-core` (the workspace CI mounts, which INCLUDES
# `test_files/` + `tests/`), then chose topics whose content tokens have
# ZERO lexical overlap with any pooled symbol. The surviving traps in
# the post-cleanup pool are the `error.rs` builder family (`auth_error`,
# `network_error`, `not_supported_error`, `rate_limit_error`,
# `timeout_error`, …), the `constants.rs` scoring remnants
# (`SECURITY_WEIGHT`, `HIGH_SECRETS_COMPLIANCE`, …), the `cache_*`
# family, and the per-language `render_*` family — so these controls
# avoid auth/network/timeout/cache/security/render/validate/parse/query
# wording. Each was verified to return an unrelated PageRank-fallback
# top1 (e.g. `clone_parser`, `render_go`, `new`, `duration`), not a
# confident topical match. Re-verify after any future symbol-surface
# shift.

[[query]]
text = "where is the HTTP request router and middleware stack configured?"
expected_top_k = []

[[query]]
text = "how are WebSocket connections upgraded and the heartbeat kept alive?"
expected_top_k = []

[[query]]
text = "what runs the database migrations inside a transaction with rollback?"
expected_top_k = []

[[query]]
text = "how does the cron scheduler trigger periodic background jobs?"
expected_top_k = []

[[query]]
text = "where are TLS certificates verified during the handshake?"
expected_top_k = []

[[query]]
text = "how is the GPU shader pipeline compiled for vertex stages?"
expected_top_k = []
