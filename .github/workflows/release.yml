# Release workflow — publishes prebuilt tarballs for the v0.2 daemon
# stack so users can install without a Rust toolchain.
#
# Triggers:
#   - push tag `v*`     → real release; uploads tarballs as a draft
#                          (so the maintainer can spot-check before
#                          flipping to "published" via the UI).
#   - workflow_dispatch  → manual run from the Actions tab; useful for
#                          dry-running the build matrix on a feature
#                          branch before tagging.
#
# Coverage:
#   - x86_64-unknown-linux-gnu     (ubuntu-latest, native)
#   - aarch64-unknown-linux-gnu    (ubuntu-24.04-arm, native)
#   - aarch64-apple-darwin         (macos-latest, native Apple Silicon)
#
# Intel Mac (x86_64-apple-darwin) is intentionally dropped. The
# `macos-13` runner pool hung indefinitely on every release in this
# series (v0.5.0, v0.5.1, v0.5.2) — see commit history. Intel Mac
# users build from source via `cargo install` for now; a Rosetta-aware
# universal binary lands when there's user demand.
#
# Windows is intentionally out — the daemon uses `std::os::unix` (Unix
# sockets + permissions) and the watcher's fs path is inotify/fsevents.
# A Windows port is a separate v1.x slice.
#
# Each matrix entry produces one tarball:
#   rts-${VERSION}-${TARGET}.tar.gz
# containing:
#   rts-${VERSION}-${TARGET}/
#     rts-daemon, rts-mcp, rts-bench, rts,
#     LICENSE-MIT, LICENSE-APACHE, README.md
#
# SHA256SUMS file aggregates checksums for all tarballs. The upload step
# uses softprops/action-gh-release@v2 which creates the release on first
# matrix entry and appends assets for subsequent entries.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but skip the GitHub release upload"
        type: boolean
        default: true

permissions:
  contents: write  # required to create/upload to GitHub Releases

env:
  CARGO_TERM_COLOR: always
  # Opt all JavaScript actions (checkout, cache, upload/download-artifact,
  # action-gh-release) into the Node.js 24 runtime ahead of the 2026-06-02
  # forced migration off Node 20. Reversible; drop once these actions ship
  # Node-24 manifests by default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Strip debug symbols from release binaries for ~30% smaller artifacts.
  # Operators tarball this onto end-user laptops; debug syms are dead
  # weight unless they're running gdb against the daemon, which is rare.
  CARGO_PROFILE_RELEASE_STRIP: "symbols"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false  # one target failing shouldn't kill the others
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo/target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Cache key is per-target so cross-target builds don't poison
          # each other's `target/` directories.
          key: ${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-release-

      - name: Build release binaries
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            -p rts-daemon \
            -p rts-mcp \
            -p rts-bench

      - name: Smoke test built binaries
        # Confirm each binary built, is executable, and reports the
        # expected `<name> <semver>` shape via `--version`. Catches
        # the "binary built but won't run on this libc" failure mode
        # before we ship the tarball to a real user.
        run: |
          set -euo pipefail
          BIN_DIR="target/${{ matrix.target }}/release"
          for b in rts-daemon rts-mcp rts-bench rts; do
            test -x "$BIN_DIR/$b" || (echo "missing $b"; exit 1)
            file "$BIN_DIR/$b"
            out=$("$BIN_DIR/$b" --version)
            echo "$out"
            # Sanity: starts with the binary name. Catches a silent
            # accidental wire-format change in --version.
            echo "$out" | grep -q "^$b " || (echo "unexpected version output: $out"; exit 1)
          done

      - name: Resolve version
        id: version
        # On tag push: use the tag (e.g. `v0.2.0-alpha.23` → `0.2.0-alpha.23`).
        # On workflow_dispatch: use the workspace version + short SHA so
        # multiple dry-runs don't collide.
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            base=$(grep -m1 '^version' Cargo.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')
            v="${base}-dev.$(git rev-parse --short HEAD)"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.value }}"
          T="${{ matrix.target }}"
          STAGE="rts-${V}-${T}"
          BIN_DIR="target/${T}/release"
          mkdir -p "$STAGE"
          cp "$BIN_DIR/rts-daemon" "$BIN_DIR/rts-mcp" "$BIN_DIR/rts-bench" "$BIN_DIR/rts" "$STAGE/"
          cp LICENSE-MIT LICENSE-APACHE README.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          # Per-artifact SHA256 to a sidecar file the aggregate step
          # collects below.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          fi
          echo "tarball=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Verify macOS code signature on staged binaries
        # Apple Silicon binaries must carry a valid (ad-hoc) signature or
        # AMFI SIGKILLs them on launch; strip+copy can invalidate it.
        # Verify the *staged* copies (what actually ships in the tarball)
        # before we hand a broken binary to a user.
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          set -euo pipefail
          STAGE="rts-${{ steps.version.outputs.value }}-${{ matrix.target }}"
          for b in rts-daemon rts-mcp rts-bench rts; do
            codesign --verify --strict --verbose=2 "$STAGE/$b"
          done
          echo "ad-hoc code signatures intact on staged macOS binaries"

      - name: Upload artifact (always — workflow_dispatch consumes these too)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to GitHub release (tag push only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          # `draft: true` is deliberate — the maintainer flips to
          # published after spot-checking each artifact. Prevents an
          # accidental tag from publishing broken binaries.
          draft: true
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  aggregate-checksums:
    name: Aggregate SHA256SUMS
    needs: build
    # Run on tag push so the aggregated SHA256SUMS file lands in the
    # draft release alongside the individual sidecars. workflow_dispatch
    # skips this — it's only relevant for actual releases.
    #
    # `success() || failure()` (not `always()`) — runs once the build
    # matrix has finished, even if one entry failed, but skips when the
    # job was cancelled. The "Assert all 3 target tarballs present" step
    # below then refuses to publish a partial SHA256SUMS (pre-2026-05 this
    # job published checksums over whatever survived, which could ship a
    # complete-looking SHA256SUMS covering fewer than 3 tarballs).
    if: github.ref_type == 'tag' && (success() || failure())
    runs-on: ubuntu-latest
    permissions:
      contents: write      # upload SHA256SUMS to the draft release
      id-token: write      # Sigstore OIDC for build-provenance attestation
      attestations: write  # write the build-provenance attestation
    steps:
      - name: Download all artifacts (tarballs + sidecars)
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assert all 3 target tarballs are present
        # fail-fast: false means a failed target would otherwise leave a
        # "complete-looking" SHA256SUMS over <3 tarballs that
        # `sha256sum -c --ignore-missing` silently passes. Refuse instead.
        run: |
          set -euo pipefail
          count=$(find artifacts -name '*.tar.gz' | wc -l | tr -d ' ')
          echo "target tarballs present: ${count}"
          if [ "${count}" -ne 3 ]; then
            echo "::error::expected 3 target tarballs, found ${count} — a build target failed; refusing to publish a partial release"
            exit 1
          fi

      - name: Concatenate SHA256SUMS
        run: |
          set -euo pipefail
          find artifacts -name '*.tar.gz.sha256' -print0 \
            | xargs -0 cat \
            | sort \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: SHA256SUMS
          fail_on_unmatched_files: true

      - name: Attest build provenance for release tarballs
        # Keyless Sigstore (SLSA) provenance for each tarball. Users verify
        # authenticity (not just integrity) with:
        #   gh attestation verify <tarball> --repo njfio/rs-agent-code-utility
        # Free for public repos; needs id-token + attestations write perms.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'artifacts/**/*.tar.gz'
