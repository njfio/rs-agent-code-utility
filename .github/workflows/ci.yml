name: CI

on:
  push:
    branches: [main, master, feature/**]
  pull_request:
    branches: ["**"]

jobs:
  rust:
    name: Rust CI (fmt, clippy, tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo/target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      # Clippy runs in advisory mode for the v0.2 alpha cycle. `-D warnings`
      # will be reintroduced once the pre-pivot `rts-core` legacy lints are
      # cleaned up incrementally per crate. See the `0.2.0-alpha.13` CHANGELOG
      # entry for context.
      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets

      - name: Unit + integration tests
        run: cargo test --workspace

      - name: Build all workspace binaries
        run: cargo build --workspace --bins
