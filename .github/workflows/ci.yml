name: CI

on:
  push:
    branches: [main, master, feature/**]
  pull_request:
    branches: ["**"]

jobs:
  rust:
    name: Rust CI (fmt, clippy, tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo/target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      # Clippy runs in advisory mode for the v0.2 alpha cycle. `-D warnings`
      # will be reintroduced once the pre-pivot `rts-core` legacy lints are
      # cleaned up incrementally per crate. See the `0.2.0-alpha.13` CHANGELOG
      # entry for context.
      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets

      - name: Unit + integration tests
        run: cargo test --workspace

      - name: Build all workspace binaries
        run: cargo build --workspace --bins

      # Semantic-baseline regression guard. Runs the bench against
      # both rts-core corpora and fails CI if `answerable_coverage`
      # regresses on either.
      #
      #   v1 audited (10 answerable):  threshold 0.95   (currently 1.00)
      #   blind-v2  (10 answerable):   threshold 0.75   (currently 0.80)
      #
      # Two corpora because the v1 one is author-graded (prone to
      # confirmation bias) while blind-v2 is outside-in. Failing
      # either is a regression worth blocking the PR for.
      #
      # Cost: ~60-90s extra per CI run total (cold-mount + indexing
      # is dominated by the first call; the second call hits a warm
      # daemon cache). Worth it — without this, the v0.5.0 numbers
      # in CHANGELOG are snapshots, not invariants.
      - name: Semantic baseline — v1 audited (regression guard)
        run: |
          RTS_MCP_BIN=$PWD/target/debug/rts-mcp \
          RTS_DAEMON_BIN=$PWD/target/debug/rts-daemon \
          ./target/debug/rts-bench semantic \
            --corpus corpus/semantic-eval-rts-core.toml \
            --workspace crates/rts-core \
            --top-k 10 \
            --dry-run \
            --check-coverage 0.95

      - name: Semantic baseline — blind-v2 (regression guard)
        run: |
          RTS_MCP_BIN=$PWD/target/debug/rts-mcp \
          RTS_DAEMON_BIN=$PWD/target/debug/rts-daemon \
          ./target/debug/rts-bench semantic \
            --corpus corpus/semantic-eval-rts-core-blind-v2.toml \
            --workspace crates/rts-core \
            --top-k 10 \
            --dry-run \
            --check-coverage 0.75
